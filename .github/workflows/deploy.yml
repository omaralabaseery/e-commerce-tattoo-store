name: Deploy to VPS (manual backup)

# Auto-deploy is handled by a cron poller ON the server itself
# (/home/ubuntu/auto-deploy.sh — checks origin/main every 2 minutes).
# This workflow is a manual fallback; running it requires the VPS_* secrets.
on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -e
            cd "${{ secrets.VPS_APP_DIR }}"
            # refuse to deploy with missing or default production secrets
            if [ ! -f .env ]; then
              echo "ERROR: .env missing on the server — copy .env.example and fill it (see docs/DEPLOY.md)"
              exit 1
            fi
            if grep -q "change-me" .env; then
              echo "ERROR: .env still contains default 'change-me' values — set real secrets first"
              exit 1
            fi
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build
            docker image prune -f
            docker compose ps
