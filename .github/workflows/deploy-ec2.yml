name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    name: Trigger deploy on the EC2 server
    runs-on: ubuntu-latest
    steps:
      - name: Call deploy webhook
        run: |
          echo "Triggering deploy…"
          resp=$(curl -sS -X POST "${{ secrets.DEPLOY_URL }}" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            --max-time 900 -w $'\nHTTP:%{http_code}')
          echo "$resp"
          # the server prints this marker only after a successful rebuild
          echo "$resp" | grep -q "webhook deploy done" \
            || { echo "::error::Deploy did not complete successfully"; exit 1; }
          echo "Deploy finished ✅"
