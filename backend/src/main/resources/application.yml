spring:
  application:
    name: tattoo-store-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tattoo_store}
    username: ${SPRING_DATASOURCE_USERNAME:tattoo}
    password: ${SPRING_DATASOURCE_PASSWORD:tattoo}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 40MB

server:
  port: 8080
  error:
    include-message: always

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-me-in-production-this-must-be-at-least-256-bits-long-secret}
    access-token-ttl-minutes: 30
    refresh-token-ttl-days: 14
  cors:
    origins: ${APP_CORS_ORIGINS:http://localhost:3000}
  uploads:
    dir: ${APP_UPLOADS_DIR:uploads}
  store:
    currency: KWD
    default-delivery-fee: 2.000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org.springframework.security: INFO
